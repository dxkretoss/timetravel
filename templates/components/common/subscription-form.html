<form class="form" action="{{urls.subscribe.action}}" method="post"
    data-error-message="{{lang 'newsletter.newsletter_error'}}">
    <fieldset class="form-fieldset">
        <input type="hidden" name="action" value="subscribe">
        <input type="hidden" name="nl_first_name" value="bc">
        <input type="hidden" name="check" value="1">
        <div class="form-field1 form-field-custom">
            <label class="form-label is-srOnly" for="nl_email">{{lang 'common.email_address'}}</label>
            <div class="form-prefixPostfix wrap subscribeFormContent">
                <input class="form-input" id="nl_email" name="nl_email" type="email" value="{{customer.email}}"
                    placeholder="Your preferred email address">
                <button type="submit" class="button button--primary form-prefixPostfix-button--postfix newsletter-submit-btn" aria-label="Subscribe">
                    <svg class="icon"><use xlink:href="#icon-m-right"></use></svg>
                </button>
            </div>
            {{#if settings.show_newsletter_summary }}
            <div class="footer-newsletter-summary">{{settings.newsletter_summary}}</div>
            {{/if}}
        </div>
    </fieldset>
</form>
